# ── crm.al.siteaccess.ru — AI Gateway Platform ────────────────────────────
# Updated: 2026-03-15

# ─── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    server_name crm.al.siteaccess.ru;
    return 301 https://$host$request_uri;
}

# ─── HTTPS ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name crm.al.siteaccess.ru;

    # ── TLS ──────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/crm.al.siteaccess.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.al.siteaccess.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript text/xml text/x-component
        application/javascript application/json application/xml
        application/rss+xml font/truetype font/opentype image/svg+xml;

    # ── Existing API (do NOT modify) ──────────────────────────────────────
    location /api/ {
        include snippets/security-headers.conf;
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:4100;
    }

    location /metrics {
        proxy_pass http://127.0.0.1:4100;
    }

    location /health {
        proxy_pass http://127.0.0.1:4100;
    }

    # ── Auth API for AI Gateway ─────────────────────────────────────────────
    location /auth/ {
        include snippets/security-headers.conf;

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── AI Gateway Backend ────────────────────────────────────────────────
    location /gateway/ {
        include snippets/security-headers.conf;

        proxy_pass http://127.0.0.1:5000/;
        proxy_http_version 1.1;

        # WebSocket upgrade support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming / long responses
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
        proxy_cache        off;

        # CORS — allow all origins for cross-device testing
        add_header Access-Control-Allow-Origin  "*"                             always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"             always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Static assets — long-term cache ──────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        include snippets/security-headers.conf;
        root /var/www/ai-gateway/dist;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }

    # ── SPA frontend ──────────────────────────────────────────────────────
    location / {
        include snippets/security-headers.conf;
        root  /var/www/ai-gateway/dist;
        index index.html;

        # Never cache the HTML shell
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";

        try_files $uri $uri/ /index.html;
    }
}
